<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogy</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <button class="hamburger" aria-label="Toggle menu">&#9776;</button>

  <div class="app-layout">
    <nav class="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar-brand">
        <span class="logo">&#128270;</span> Catalogy
      </div>
      <ul class="sidebar-nav">
        <li><a href="#/" aria-label="Dashboard"><span class="nav-icon">&#9632;</span> Dashboard</a></li>
        <li><a href="#/browse" aria-label="Browse media"><span class="nav-icon">&#9871;</span> Browse</a></li>
        <li><a href="#/search" aria-label="Search"><span class="nav-icon">&#128269;</span> Search</a></li>
        <li><a href="#/duplicates" aria-label="Duplicates"><span class="nav-icon">&#128203;</span> Duplicates</a></li>
        <li><a href="#/setup" aria-label="Setup"><span class="nav-icon">&#9881;</span> Setup</a></li>
      </ul>
    </nav>

    <main class="main-content" id="page-outlet" role="main">
      <div class="skeleton skeleton-card" style="height:200px;margin:40px 0"></div>
    </main>
  </div>

  <div id="lightbox" class="lightbox" onclick="if(event.target===this)closeLightbox()" role="dialog" aria-label="Media viewer"></div>

  <script src="/app.js"></script>
  <script src="/components.js"></script>
  <script src="/pages.js"></script>
</body>
</html>
